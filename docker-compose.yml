services:
  mlflow:
    build:
      context: .
    image: waferwatch-api:local
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --workers
      - "1"
      - --backend-store-uri
      - sqlite:///mlflow_data/mlflow.db
      - --default-artifact-root
      - file:///D:/waferwatch/mlflow_data/artifacts
      - --allowed-hosts
      - mlflow,mlflow:5000,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/app/mlflow_data

  api:
    build:
      context: .
    image: waferwatch-api:local
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      WAFERWATCH_MODEL_NAME: WaferWatchRiskModel
      WAFERWATCH_MODEL_ALIAS: champion
    depends_on:
      mlflow:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./mlflow_data:/app/mlflow_data